<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Scraping Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>Web Scraping Dashboard</h1>
            <div class="header-info">
                <span id="last-updated">Last updated: <span class="timestamp">-</span></span>
            </div>
        </header>

        <!-- Statistics Cards -->
        <section class="stats-section">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📊</div>
                    <div class="stat-content">
                        <h3>Total Results</h3>
                        <p class="stat-value" id="total-results">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-content">
                        <h3>Success Rate</h3>
                        <p class="stat-value" id="success-rate">0%</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">⏱️</div>
                    <div class="stat-content">
                        <h3>Avg. Response Time</h3>
                        <p class="stat-value" id="avg-response-time">0ms</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📈</div>
                    <div class="stat-content">
                        <h3>Today's Scrapes</h3>
                        <p class="stat-value" id="today-scrapes">0</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Charts Section -->
        <section class="charts-section">
            <div class="charts-grid">
                <div class="chart-container">
                    <h3>Results Over Time</h3>
                    <canvas id="timeChart"></canvas>
                </div>
                <div class="chart-container">
                    <h3>Status Distribution</h3>
                    <canvas id="statusChart"></canvas>
                </div>
            </div>
        </section>

        <!-- Results Table -->
        <section class="table-section">
            <div class="table-header">
                <h2>Recent Results</h2>
                <div class="table-controls">
                    <input type="text" id="search-input" placeholder="Search results..." class="search-input">
                    <select id="filter-status" class="filter-select">
                        <option value="">All Status</option>
                        <option value="success">Success</option>
                        <option value="failed">Failed</option>
                        <option value="pending">Pending</option>
                    </select>
                </div>
            </div>
            
            <div class="table-wrapper">
                <table class="results-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>URL</th>
                            <th>Status</th>
                            <th>Response Time</th>
                            <th>Timestamp</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="results-tbody">
                        <!-- Results will be populated here -->
                    </tbody>
                </table>
            </div>
            
            <div class="pagination">
                <button id="prev-page" class="pagination-btn" disabled>Previous</button>
                <span id="page-info">Page 1 of 1</span>
                <button id="next-page" class="pagination-btn" disabled>Next</button>
            </div>
        </section>
    </div>

    <!-- Modal for result details -->
    <div id="result-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Result Details</h2>
            <div id="modal-body">
                <!-- Details will be populated here -->
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
